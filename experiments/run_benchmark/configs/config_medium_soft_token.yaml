personalization_system:
  _target_: llm_personalization.personalization_system.soft_token_personalization.soft_token_personalization_system.SoftTokenPersonalizationSystem
  attributes:
    - emotionally neutral
    - casual
    - elaborate
    - acknowledges uncertainty
    - prescriptive
    - assumes no prior knowledge
    - gentle
    - persuasive
    - presents multiple perspectives
    - collaborative
  soft_token_model_config:
    llm_model: google/gemma-4-31B-it
    encoder_model: BAAI/bge-m3
    num_soft_tokens: 8
    encoder_max_length: 8192
    llm_max_length: 2048
    llm_dtype: bfloat16
    encoder_dtype: float32
    lora_r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    # lora_target_modules: null  # let peft infer defaults for this arch
  generation_llm_helper_config:
    model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8
    tensor_parallel_size: 4
    max_model_len: 32768
    gpu_memory_utilization: 0.90
    sampling_params:
      max_tokens: 2048
  dpo_train_kwargs:
    epochs: 1
    batch_size: 2
    grad_accum_steps: 8
    lr: 1.0e-4
    beta: 0.1
    max_length: 2048
    log_every: 10
    seed: 42
  encoder_batch_size: 16
  generation_kwargs:
    max_new_tokens: 512
    do_sample: false
    batch_size: 4

unpersonalized_llm_helper:
  _target_: llm_personalization.llm.llm_helper.LLMHelper
  model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8
  tensor_parallel_size: 4
  max_model_len: 32768
  gpu_memory_utilization: 0.90
  sampling_params:
    max_tokens: 2048

attribute_personalization_dataset:
  _target_: llm_personalization.benchmark.attribute_benchmark.attribute_personalization_dataset.AttributePersonalizationLabeledDataset
  dataset_path: data/synthetic_conversations/gpt-oss-120b_k10_1attrs_16000_1000_hf
  train_limit: 1500
  test_limit: 200
  history_max_len: 2

attribute_judge:
  _target_: llm_personalization.judge.ParsedRatingJudge
  model: openai/gpt-oss-120b
  tensor_parallel_size: 4
  max_model_len: 32768
  gpu_memory_utilization: 0.90
  enable_thinking: true
  sampling_params:
    max_tokens: 4096
    temperature: 1.0
    top_p: 0.95

output_dir: data/run_benchmark/{timestamp}_medium_soft_token

num_worlds: 1
world_matrix_type: permutation

user_attributes:
- verbose
- enthusiastic
- open-ended
- tech-savvy
- highly constrained
- anxious
- transactional
- hypothetical
- unpolished
- prescriptive

num_attributes_per_user: 1

response_attributes:
- emotionally neutral
- casual
- elaborate
- acknowledges uncertainty
- prescriptive
- assumes no prior knowledge
- gentle
- persuasive
- presents multiple perspectives
- collaborative

num_response_attributes_per_user: 1

# Persona Personalization Benchmark
persona_personalization_dataset:
  _target_: llm_personalization.benchmark.persona_benchmark.persona_personalization_dataset.PersonaPersonalizationLabeledDataset
  train_path: data/synthetic_conversations_persona/gpt-oss-120b_persona_2000_3000_first_message_only_train.jsonl
  test_path: data/synthetic_conversations_persona/gpt-oss-120b_persona_2000_3000_first_message_only_test.jsonl
  train_limit: 1500
  test_limit: 200
  history_max_len: 2

persona_judge:
