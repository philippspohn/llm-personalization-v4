personalization_system:
  _target_: llm_personalization.personalization_system.attribute_personalization.attribute_personalization_system.AttributePersonalizationSystem
  attribute_selection: margin
  text_classification_model_config:
    pooling: mean
    base_model: answerdotai/ModernBERT-base
    max_length: 8192
    dtype: float32
  text_classification_model_train_kwargs:
    batch_size: 16
    grad_accum_steps: 1
    epochs: 3
    lr: 2e-5
  llm_helper_config:
    model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8
    tensor_parallel_size: 4
    max_model_len: 32768
    gpu_memory_utilization: 0.90
    sampling_params:
      max_tokens: 2048
  attributes:
    - emotionally neutral
    - casual
    - elaborate
    - acknowledges uncertainty
    - prescriptive
    - assumes no prior knowledge
    - gentle
    - persuasive
    - presents multiple perspectives
    - collaborative
  predict_batch_size: 32

unpersonalized_llm_helper:
  _target_: llm_personalization.llm.llm_helper.LLMHelper
  model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8
  tensor_parallel_size: 4
  max_model_len: 32768
  gpu_memory_utilization: 0.90
  sampling_params:
    max_tokens: 2048

attribute_personalization_dataset:
  _target_: llm_personalization.benchmark.attribute_benchmark.attribute_personalization_dataset.AttributePersonalizationLabeledDataset
  dataset_path: data/synthetic_conversations/gpt-oss-120b_k10_1attrs_16000_1000_hf
  train_limit: 8000
  test_limit: 1000
  history_max_len: 2

attribute_judge:
  _target_: llm_personalization.judge.ParsedRatingJudge
  model: openai/gpt-oss-120b
  tensor_parallel_size: 4
  max_model_len: 32768
  gpu_memory_utilization: 0.90
  enable_thinking: true
  sampling_params:
    max_tokens: 4096
    temperature: 1.0
    top_p: 0.95

output_dir: data/run_benchmark/{timestamp}_medium

num_worlds: 1
world_matrix_type: permutation

user_attributes:
- verbose
- enthusiastic
- open-ended
- tech-savvy
- highly constrained
- anxious
- transactional
- hypothetical
- unpolished
- prescriptive

num_attributes_per_user: 1

response_attributes:
- emotionally neutral
- casual
- elaborate
- acknowledges uncertainty
- prescriptive
- assumes no prior knowledge
- gentle
- persuasive
- presents multiple perspectives
- collaborative

num_response_attributes_per_user: 1

# Persona Personalization Benchmark
persona_personalization_dataset:
  _target_: llm_personalization.benchmark.persona_benchmark.persona_personalization_dataset.PersonaPersonalizationLabeledDataset
  train_path: data/synthetic_conversations_persona/gpt-oss-120b_persona_2000_3000_first_message_only_train.jsonl
  test_path: data/synthetic_conversations_persona/gpt-oss-120b_persona_2000_3000_first_message_only_test.jsonl
  train_limit: 1500
  test_limit: 200
  history_max_len: 2

persona_judge:
  _target_: llm_personalization.judge.ParsedRatingJudge
  model: openai/gpt-oss-120b
  tensor_parallel_size: 4
  max_model_len: 32768
  gpu_memory_utilization: 0.90
  enable_thinking: true
  sampling_params:
    max_tokens: 4096
    temperature: 1.0
    top_p: 0.95

persona_personalization_system:
  _target_: llm_personalization.personalization_system.attribute_personalization.attribute_personalization_system.AttributePersonalizationSystem
  attribute_selection: margin
  text_classification_model_config:
    pooling: mean
    base_model: answerdotai/ModernBERT-base
    max_length: 8192
    dtype: float32
  text_classification_model_train_kwargs:
    batch_size: 16
    grad_accum_steps: 1
    epochs: 3
    lr: 2e-5
  llm_helper_config:
    model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8
    tensor_parallel_size: 4
    max_model_len: 32768
    gpu_memory_utilization: 0.90
    sampling_params:
      max_tokens: 2048
  attributes:
    - emotionally neutral
    - casual
    - elaborate
    - acknowledges uncertainty
    - prescriptive
    - assumes no prior knowledge
    - gentle
    - persuasive
    - presents multiple perspectives
    - collaborative
  predict_batch_size: 32

# Robustness Benchmark
robustness:
  include_mmlu_pro: true
  include_truthfulqa: true
  include_bbq: true
  mmlu_pro_limit: 200
  truthfulqa_limit: 200
  bbq_limit: 200
