# @package _global_

user_attributes:
  - verbose
  - professional
  - open-minded
  - unpolished

response_attributes:
  - emotionally neutral
  - peer-to-peer tone
  - elaborate
  - concrete

num_attributes_per_user: 2
num_response_attributes_per_user: 2

pool_tag: k4_2attrs

cache:
  conversations_train: data/synthetic_conversations/gpt-oss-120b_k4_2attrs_16000_1000_train.jsonl
  conversations_test:  data/synthetic_conversations/gpt-oss-120b_k4_2attrs_16000_1000_test.jsonl
  responses_train:     data/attribute_responses/gpt-oss-120b_k4_2attrs_nemotron/train.jsonl
  responses_test:      data/attribute_responses/gpt-oss-120b_k4_2attrs_nemotron/test.jsonl
  ratings_train:       data/attribute_response_judging/gpt-oss-120b_k4_2attrs_nemotron_gptoss_judge
  ratings_test:        data/attribute_response_judging/gpt-oss-120b_k4_2attrs_nemotron_gptoss_judge
  unpersonalized_responses_test: data/unpersonalized_responses/${gen_model_tag}/${pool_tag}_test
  unpersonalized_ratings_test:   data/unpersonalized_response_judging/${gen_model_tag}_${judge_model_tag}/${pool_tag}_test
  val_size: 500
  history_max_len: 2
  train_limit: 4500
  test_limit: null
