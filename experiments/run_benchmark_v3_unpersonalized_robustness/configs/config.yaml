defaults:
  - llm: qwen3p5_27b
  - robustness: full
  - _self_

# `gen_model_tag` comes from `llm/*`. `robustness:` comes from `robustness/*`.
# Submitter typically runs:
#   sbatch sbatch/generate_unpersonalized_robustness.sbatch llm=qwen3p5_27b
#   sbatch sbatch/generate_unpersonalized_robustness.sbatch llm=llama31_8b

force: false   # set to true to regenerate even if the cache file exists
