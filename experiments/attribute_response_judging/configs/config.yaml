defaults:
  - judge: gpt-oss-120b
  - attributes: k10
  - dataset: k10_1attrs
  - _self_

# `inputs` and `output_dir` come from the `dataset` config group
# (configs/dataset/{kN_Mattrs}.yaml). Each dataset file is a JSONL produced by
# `experiments/attribute_responses` and its users are tagged with `split_name`
# in the output, then concatenated in the listed order before being sliced
# across array tasks.
#
# The judge attribute list comes from the `attributes` config group
# (configs/attributes/{k2,k4,k6,k8,k10}.yaml) and must match the response
# attributes used in `experiments/attribute_responses` for that dataset
# (i.e. `attributes=kN` for any `dataset=kN_*attrs`). Avoid-side targets are
# derived as `11 - score` downstream.

# Array slicing.
array_task_id: ${oc.env:SLURM_ARRAY_TASK_ID,0}
array_task_count: ${oc.env:SLURM_ARRAY_TASK_COUNT,1}

# Optional cap on number of users (after slicing). Useful for smoke tests.
limit: null
